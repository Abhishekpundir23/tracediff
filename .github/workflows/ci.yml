name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest tests -q
      - name: Demo smoke test (run + diff end to end)
        working-directory: examples
        run: |
          agentdiff run --suite suite.yaml --agent demo_agent:run --repeats 2 --out baseline.json
          AGENTDIFF_DEMO_VARIANT=b agentdiff run --suite suite.yaml --agent demo_agent:run --repeats 2 --out current.json
          # the demo variant intentionally regresses, so diff must exit 1
          if agentdiff diff baseline.json current.json --md report.md; then
            echo "expected regressions to be detected" && exit 1
          fi
          cat report.md
